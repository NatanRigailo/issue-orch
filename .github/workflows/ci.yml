name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install flake8
      - run: flake8 app/ main.py --max-line-length=120

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit
      - run: bandit -r app/ -ll

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, sast]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/natanrigailo/issue-orch:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/natanrigailo/issue-orch:scan
          cache-from: type=gha
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/natanrigailo/issue-orch:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
